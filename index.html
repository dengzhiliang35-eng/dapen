<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱农晋祠智慧农场 - 一号大棚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f5f5f5; }
        
        /* 顶部宣传横幅样式 */
        .banner {
            width: 100%;
            overflow: hidden;
            border-radius: 0 0 10px 10px;
        }
        .banner img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .header { background: #000; color: #fff; padding: 15px; text-align: center; display: none; } /* 隐藏原黑色标题栏，用横幅替代 */
        .container { background: #fff; margin: 10px; border-radius: 10px; padding: 15px; }
        
        .棚头 { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px; 
            align-items: center; 
        }
        .棚头 .img-box {
            width: 120px; 
            height: 90px; 
            border-radius: 8px; 
            overflow: hidden;
            border: 1px solid #eee;
        }
        .棚头 .img-box img { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .棚信息 { flex: 1; }
        .棚名 { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .棚ID { color: #666; font-size: 14px; margin-bottom: 10px; }
        .状态 { background: #00c853; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 14px; display: inline-block; }
        
        .基础信息 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin: 15px 0; 
        }
        .信息项 { 
            background: #f5f5f5; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 16px; 
        }
        .信息项 .label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            color: #333;
        }
        
        .模块 { margin: 20px 0; padding: 15px; background: #fff; border-radius: 10px; }
        .模块项 {
            display: flex; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #eee;
            text-decoration: none;
            color: inherit;
        }
        .模块项:last-child { border-bottom: none; }
        .模块-icon { font-size: 24px; margin-right: 10px; }
        .模块-name { flex: 1; font-size: 18px; }
        .arrow { color: #999; font-size: 18px; }
    </style>
</head>
<body>
    <!-- 页面最顶部：宣传横幅 -->
    <div class="banner">
        <img src="banner.jpg" alt="爱农晋祠现代农业园">
    </div>

    <div class="container">
        <div class="棚头">
            <div class="img-box">
                <img src="dapeng.jpg" alt="一号大棚实拍">
            </div>
            <div class="棚信息">
                <div class="棚名">一号大棚</div>
                <div class="棚ID">ID: 一号大棚</div>
                <div class="状态">正常种植</div>
            </div>
        </div>

        <div class="基础信息">
            <div class="信息项">
                <span class="label">棚号</span>
                1号棚
            </div>
            <div class="信息项">
                <span class="label">种植户</span>
                张毅炫
            </div>
            <div class="信息项">
                <span class="label">种植作物</span>
                甜瓜
            </div>
            <div class="信息项">
                <span class="label">种植品种</span>
                爱农蜜瓜
            </div>
            <div class="信息项">
                <span class="label">定植时间</span>
                2026年3月10号
            </div>
        </div>
    </div>

    <div class="模块">
        <a class="模块项" href="环境.html">
            <div class="模块-icon">🍃</div>
            <div class="模块-name">生长环境</div>
            <div class="arrow">></div>
        </a>
        <a class="模块项" href="种植.html">
            <div class="模块-icon">🌱</div>
            <div class="模块-name">种植详情</div>
            <div class="arrow">></div>
        </a>
    </div>
</body>
</html>
