<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧农场 - 一号大棚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f5f5f5; }
        .header { background: #000; color: #fff; padding: 15px; text-align: center; }
        .container { background: #fff; margin: 10px; border-radius: 10px; padding: 15px; }
        .棚头 { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .棚头 img { 
            width: 120px; 
            height: 90px; 
            border-radius: 8px; 
            object-fit: cover;
        }
        .棚信息 { flex: 1; }
        .棚名 { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .棚ID { color: #666; font-size: 14px; margin-bottom: 10px; }
        .状态 { background: #00c853; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 14px; display: inline-block; }
        .基础信息 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .信息项 { background: #f5f5f5; padding: 12px; border-radius: 8px; font-size: 16px; }
        .模块 { margin: 20px 0; padding: 15px; background: #fff; border-radius: 10px; }
        .模块项 {
            display: flex; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #eee;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .模块项:last-child { border-bottom: none; }
        .模块项:hover { background: #f9f9f9; }
        .模块图标 { width: 24px; height: 24px; margin-right: 10px; font-size: 24px; }
        .模块名 { flex: 1; font-size: 18px; }
        .箭头 { color: #999; font-size: 18px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>智慧农场</h1>
        <p style="font-size:14px; opacity:0.8;">fx.sansun.cc</p>
    </div>
    <div class="container">
        <div class="棚头">
            <img src="dapeng.jpg.png" alt="一号大棚实拍">
            <div class="棚信息">
                <div class="棚名">一号大棚</div>
                <div class="棚ID">ID: 一号大棚</div>
                <div class="状态">正常种植</div>
            </div>
        </div>

        <div class="基础信息">
            <div class="信息项">种植户 白要忠</div>
            <div class="信息项">种植作物 </div>
            <div class="信息项">种植品种 </div>
            <div class="信息项">种植时间 </div>
        </div>
    </div>

    <div class="模块">
        <a class="模块项" href="环境.html" target="_blank">
            <div class="模块图标">🍃</div>
            <div class="模块名">生长环境</div>
            <div class="箭头">></div>
        </a>
        <a class="模块项" href="种植.html" target="_blank">
            <div class="模块图标">🌱</div>
            <div class="模块名">种植详情</div>
            <div class="箭头">></div>
        </a>
    </div>
</body>
</html>
