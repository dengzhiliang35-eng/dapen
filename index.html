<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山西爱农晋祠现代农业园 - 一号大棚</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f5f5f5; }

        /* 顶部横幅样式 */
        .banner {
            width: 100%;
            display: block;
        }
        .banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 大棚信息容器 */
        .container {
            background: #fff;
            margin: 10px;
            border-radius: 10px;
            padding: 15px;
        }
        
        .棚头 { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px; 
            align-items: center; 
        }
        .棚头 .img-box {
            width: 120px; 
            height: 90px; 
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .棚头 .img-box img { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .棚信息 { flex: 1; }
        .棚名 { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .棚ID { color: #666; font-size: 14px; margin-bottom: 10px; }
        .状态 { background: #00c853; color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 14px; display: inline-block; }
        
        .基础信息 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin: 15px 0; 
        }
        .信息项 { 
            background: #f5f5f5; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 16px; 
        }
        .信息项 .label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            color: #333;
        }
        
        /* 功能模块按钮 */
        .模块 {
            margin: 20px 10px;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
        }
        .模块项 {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            text-decoration: none;
            color: inherit;
        }
        .模块项:last-child { border-bottom: none; }
        .模块-icon { font-size: 24px; margin-right: 10px; }
        .模块-name { flex: 1; font-size: 18px; }
        .arrow { color: #999; font-size: 18px; }

        /* 底部园区介绍区域 */
        .bottom-section {
            background: #fff;
            margin: 10px;
            border-radius: 10px;
            padding: 20px;
        }

        /* 园区大门图样式 */
        .园区大门图 {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 20px;
            display: block;
        }

        /* 园区基础信息（红圈部分） */
        .园区基础信息 {
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 16px;
        }
        .园区基础信息 strong {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
        }

        /* 园区详细介绍 */
        .园区介绍 {
            line-height: 1.8;
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
            text-indent: 2em;
        }

        /* 导航链接 */
        .导航链接 {
            font-size: 18px;
            font-weight: bold;
            color: #00a653;
            margin-bottom: 10px;
            display: block;
            text-decoration: none;
        }
        .导航地址 {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* 公众号二维码区域（带黑框） */
        .公众号区域 {
            display: flex;
            align-items: center;
            gap: 20px;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 15px;
            flex-wrap: wrap;
        }
        .公众号二维码 {
            width: 200px;
            height: 200px;
            border-radius: 4px;
        }
        .公众号文字 {
            flex: 1;
            min-width: 250px;
            line-height: 1.8;
        }
        .公众号标题 {
            font-size: 20px;
            font-weight: bold;
            color: #000;
            margin-bottom: 5px;
        }
        .公众号标语 {
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>

<!-- 顶部宣传横幅 -->
<div class="banner">

</div>

    <a class="模块项" href="种植.html">

    </a>
</div>

<!-- 底部完整区域 -->

    <!-- 1. 园区大门图（放在红圈文字上方） -->
    <img src="gate.jpg" alt="爱农晋祠现代农业园大门" class="园区大门图">

    <!-- 2. 红圈部分的基础信息 -->
    <div class="园区基础信息">
        <strong>山西爱农晋祠现代农业园</strong>

    </div>

    <!-- 3. 园区详细介绍 -->
    <div class="园区介绍">
        农场名称：山西爱农晋祠现代农业园<br>
        园区位于太原市晋源区王郭村，由返乡新农人邓万杰创办，总占地700余亩。<br>
        园区将撂荒40年的汾河荒滩改造为良田，建设现代化智能温室大棚，采用无土栽培、水肥一体化等先进技术，主要种植优质瓜果蔬菜。

    <div class="导航地址">

    <!-- 5. 公众号二维码（带黑框） -->
    <div class="公众号区域">
        <img src="qrcode.jpg" alt="云上爱农公众号二维码" class="公众号二维码">
        <div class="公众号文字">
            <div class="公众号标题">云上爱农公众号</div>
            <div class="公众号标语">

</div>

</body>
