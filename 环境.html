<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生长环境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background: #f5f5f5;
        }
        .header {
            background: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .img-box {
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
        }
        .img-box img {
            width: 100%;
            display: block;
        }
        .back {
            text-align: center;
            margin-top: 20px;
        }
        .back a {
            display: inline-block;
            background: #00c853;
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
        }
        /* 新增环境数据样式 */
        .env-info {
            font-size: 17px;
            line-height: 2;
            margin-bottom: 20px;
        }
        /* 分隔线 */
        .divider {
            height: 1px;
            background: #ccc;
            margin: 25px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>生长环境</h2>
    </div>

    <div class="container">
        <!-- 新增环境数据 -->
        <div class="env-info">
            湿度：60％左右<br>
            温度：28~32°<br>
            二氧化碳(CO₂)浓度：1000-1200ppm
        </div>

        <!-- 分隔线 -->
        <div class="divider"></div>

        <div class="title">大棚实拍</div>

        <div class="img-box">
            <img src="env1.jpg.jpg">
        </div>
        <div class="img-box">
            <img src="env2.jpg.jpg">
        </div>
        <div class="img-box">
            <img src="env3.jpg.jpg">
        </div>
        <div class="img-box">
            <img src="env4.jpg.jpg">
        </div>

        <div class="back">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>
</body>
</html>
